<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THR Jackpot - Eid Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        jakarta: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .win-animate {
            animation: pulse-gold 2s infinite;
        }

        /* Lebaran Win Animation - Falling Stars/Sparkles */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .particle {
            position: fixed;
            top: -5%;
            user-select: none;
            pointer-events: none;
            z-index: 50;
            animation: fall linear forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 font-sans text-white bg-slate-950 bg-cover bg-center bg-no-repeat overflow-hidden" 
      style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('IMG_3001.jpg');">

    <div class="w-full max-w-sm bg-white/5 backdrop-blur-xl border border-white/10 rounded-[1.25rem] p-8 shadow-2xl transition-all duration-500 relative z-10">
        
        <header class="text-center mb-4">
            <h1 class="font-cinzel text-4xl font-bold gold-text tracking-wider">
                BEDUG MASTER
            </h1>
            <p class="text-slate-400 text-xs tracking-[0.3em] uppercase">
                Buka Kunci THR Kamu!
            </p>
        </header>

        <div id="jackpot-container" class="relative bg-slate-900/50 rounded-2xl p-6 border border-indigo-500/20 shadow-inner mb-5 text-center transition-all duration-700">
            <div id="slot-row" class="flex justify-center items-center gap-4 text-5xl h-12 transition-all duration-500">
                <span>🎰</span>
                <span>🎰</span>
                <span>🎰</span>
            </div>
            
            <div id="jackpot-msg" class="mt-4 text-indigo-300 text-sm font-medium tracking-wide min-h-[1.25rem]">
                Kunci Salah!
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest">Peluang</span>
                <span class="text-xs text-white font-bold">15% Random</span>
            </div>
            <div class="flex flex-col text-right">
                <span id="stat-label" class="text-[10px] text-slate-500 uppercase tracking-widest">Sisa Kuota</span>
                <span id="stat-value" class="text-xs text-white font-bold"><span id="quota-count">10</span>/10</span>
            </div>
        </div>

        <button id="spin-btn" class="w-full relative group overflow-hidden bg-gradient-to-br from-orange-500 to-red-600 p-[1px] rounded-2xl transition-all active:scale-95 shadow-[0_0_20px_rgba(234,88,12,0.3)]">
            <div class="bg-slate-900 group-hover:bg-transparent transition-colors py-4 rounded-[15px]">
                <span id="btn-text" class="text-white font-bold tracking-widest text-lg uppercase">Spin Sekarang</span>
            </div>
        </button>

        <footer class="mt-8 text-center">
            <p class="text-[9px] text-slate-600 tracking-[0.5em] uppercase italic">
                Powered by ust. Ngoding
            </p>
        </footer>
    </div>

    <script>
        const spinBtn = document.getElementById('spin-btn');
        const btnText = document.getElementById('btn-text');
        const quotaCount = document.getElementById('quota-count');
        const slotRow = document.getElementById('slot-row');
        const jackpotMsg = document.getElementById('jackpot-msg');
        const jackpotContainer = document.getElementById('jackpot-container');

        let jackpotQuota = 10;
        const totalInitial = 10;
        let isSpinning = false;
        const symbols = ['💰', '💎', '🎁', '🔔', '7️⃣', '🧧'];

        spinBtn.addEventListener('click', () => {
            if (jackpotQuota <= 0 || isSpinning) return;
            startGame();
        });

        function createSparkle() {
            const colors = ['#FFD700', '#F0E68C', '#32CD32', '#FFFFFF'];
            const p = document.createElement('div');
            p.classList.add('particle');
            p.innerHTML = ['✨', '⭐', '🌙'][Math.floor(Math.random() * 3)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            p.style.animationDuration = (Math.random() * 2 + 1) + 's';
            p.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }

        function triggerWinEffect() {
            const interval = setInterval(createSparkle, 100);
            setTimeout(() => clearInterval(interval), 5000);
        }

        function startGame() {
            isSpinning = true;
            jackpotQuota--;
            quotaCount.innerText = jackpotQuota;

            spinBtn.disabled = true;
            jackpotMsg.innerText = "Memutar keberuntungan...";
            jackpotMsg.classList.remove('text-green-400', 'text-red-400', 'animate-pulse');
            
            let counter = 0;
            const duration = 20; 

            const spinEffect = setInterval(() => {
                const s1 = symbols[Math.floor(Math.random() * symbols.length)];
                const s2 = symbols[Math.floor(Math.random() * symbols.length)];
                const s3 = symbols[Math.floor(Math.random() * symbols.length)];
                
                slotRow.innerHTML = `
                    <span class="animate-bounce">${s1}</span>
                    <span class="animate-bounce" style="animation-delay: 0.1s">${s2}</span>
                    <span class="animate-bounce" style="animation-delay: 0.2s">${s3}</span>
                `;
                counter++;

                if (counter >= duration) {
                    clearInterval(spinEffect);
                    checkWinner();
                }
            }, 80);
        }

        function checkWinner() {
            isSpinning = false;
            // logic 15% probability
            const isWin = Math.random() < 0.15;

            if (isWin) {
                const winOrder = totalInitial - jackpotQuota;
                quotaCount.innerText = winOrder;
                jackpotQuota = 0; 

                triggerWinEffect(); // Start falling stars
                
                // 1. Show QR Code
                slotRow.classList.remove('h-12');
                slotRow.classList.add('h-auto', 'py-2');
                slotRow.innerHTML = `
                    <div class="bg-white p-3 rounded-xl shadow-[0_0_15px_rgba(255,255,255,0.3)] inline-block win-animate">
                        <img src="thr.png" alt="QR CODE THR" class="w-32 h-32 object-contain mx-auto">
                    </div>
                `;
                
                // 2. Update Message
                jackpotMsg.innerHTML = "MABRUK! SCAN QR UNTUK THR";
                jackpotMsg.classList.add('text-green-400', 'animate-pulse', 'font-bold', 'text-lg');
                
                // 3. Gold border container
                jackpotContainer.classList.replace('border-indigo-500/20', 'border-yellow-500');
                
                // 4. Update Button Colors & Shadow
                btnText.innerText = "AMBIL HADIAH";
                spinBtn.classList.remove('from-orange-500', 'to-red-600', 'shadow-[0_0_20px_rgba(234,88,12,0.3)]');
                spinBtn.classList.add('from-emerald-500', 'to-green-600', 'shadow-[0_0_25px_rgba(16,185,129,0.6)]');
                
                // Redirect logic
                spinBtn.disabled = false;
                spinBtn.onclick = () => window.open('https://app.gopay.co.id/NF8p/d6bibzzx', '_blank');
                
            } else {
                if (jackpotQuota === 0) {
                    jackpotMsg.innerText = "Yah, kuota habis! Coba lagi nanti.";
                    jackpotMsg.classList.add('text-red-400');
                    btnText.innerText = "GAME OVER";
                    spinBtn.disabled = true;
                    slotRow.classList.add('grayscale', 'opacity-50');
                } else {
                    jackpotMsg.innerText = "Belum beruntung, ayo coba lagi!";
                    spinBtn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
