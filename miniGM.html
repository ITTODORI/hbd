<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THR Jackpot - Eid Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        jakarta: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* Efek Teks Emas Murni Tailwind tidak mendukung -webkit-background-clip secara native untuk semua browser */
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 font-sans text-white bg-cover bg-center bg-no-repeat" 
      style="background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('IMG_3001.jpg');">

    <div class="w-full max-w-sm bg-white/5 backdrop-blur-xl border border-white/10 rounded-[1.25rem] p-8 shadow-2xl transition-all duration-500">
        
        <header class="text-center mb-4">
            <h1 class="font-cinzel text-4xl font-bold gold-text tracking-wider">
                BEDUG MASTER
            </h1>
            <p class="text-slate-400 text-xs tracking-[0.3em] uppercase">game pull Bedug Lebaran</p>
        </header>

        <div class="relative bg-slate-900/50 rounded-2xl p-6 border border-indigo-500/20 shadow-inner mb-5">
            <div id="slot-row" class="flex justify-center items-center gap-4 text-5xl h-10 transition-all">
                <span class="drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">🎰</span>
                <span class="drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">🎰</span>
                <span class="drop-shadow-[0_0_10_rgba(255,255,255,0.3)]">🎰</span>
            </div>
            
            <div id="jackpot-msg" class="text-center mt-4 text-indigo-300 text-sm font-medium tracking-wide min-h-[1.25rem]">
                Coba keberuntunganmu!
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest">Peluang</span>
                <span class="text-xs text-white font-bold">15% Random</span>
            </div>
            <div class="flex flex-col text-right">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest">Sisa Kuota</span>
                <span class="text-xs text-white font-bold"><span id="quota-count">10</span>/10</span>
            </div>
        </div>

        <button id="spin-btn" class="w-full relative group overflow-hidden bg-gradient-to-br from-orange-500 to-red-600 p-[1px] rounded-2xl transition-all active:scale-95 shadow-[0_0_20px_rgba(234,88,12,0.3)]">
            <div class="bg-slate-900 group-hover:bg-transparent transition-colors py-4 rounded-[15px]">
                <span id="btn-text" class="text-white font-bold tracking-widest text-lg">SPIN SEKARANG</span>
            </div>
        </button>

        <footer class="mt-8 text-center">
            <p class="text-[9px] text-slate-600 tracking-[0.5em] uppercase italic">
                Powered by iMen Digital
            </p>
        </footer>
    </div>

    <script>
        const spinBtn = document.getElementById('spin-btn');
        const btnText = document.getElementById('btn-text');
        const quotaCount = document.getElementById('quota-count');
        const slotRow = document.getElementById('slot-row');
        const jackpotMsg = document.getElementById('jackpot-msg');

        let jackpotQuota = 10;
        let isSpinning = false;
        const symbols = ['💰', '💎', '🎁', '🔔', '7️⃣', '🧧'];

        spinBtn.addEventListener('click', () => {
            if (jackpotQuota <= 0 || isSpinning) return;
            startGame();
        });

        function startGame() {
            isSpinning = true;
            jackpotQuota--;
            quotaCount.innerText = jackpotQuota;

            // Reset UI
            spinBtn.disabled = true;
            jackpotMsg.innerText = "Memutar keberuntungan...";
            jackpotMsg.classList.remove('text-green-400', 'text-red-400');
            
            let counter = 0;
            const duration = 25; // jumlah putaran visual

            const spinEffect = setInterval(() => {
                const s1 = symbols[Math.floor(Math.random() * symbols.length)];
                const s2 = symbols[Math.floor(Math.random() * symbols.length)];
                const s3 = symbols[Math.floor(Math.random() * symbols.length)];
                
                slotRow.innerHTML = `
                    <span class="animate-bounce">${s1}</span>
                    <span class="animate-bounce" style="animation-delay: 0.1s">${s2}</span>
                    <span class="animate-bounce" style="animation-delay: 0.2s">${s3}</span>
                `;
                counter++;

                if (counter >= duration) {
                    clearInterval(spinEffect);
                    checkWinner();
                }
            }, 70);
        }

        function checkWinner() {
            isSpinning = false;
            // Logika probabilitas 15%
            const isWin = Math.random() < 0.15;

            if (isWin) {
                // Tampilan MENANG
                jackpotQuota = 0;
                quotaCount.innerText = "0";
                slotRow.innerHTML = `<span>🧧</span><span>🧧</span><span>🧧</span>`;
                
                jackpotMsg.innerText = "JACKPOT! KAMU DAPAT THR!";
                jackpotMsg.classList.add('text-green-400', 'animate-pulse', 'font-bold');
                
                btnText.innerText = "AMBIL HADIAH";
                // Ubah warna tombol jadi hijau
                spinBtn.classList.remove('from-orange-500', 'to-red-600');
                spinBtn.classList.add('from-emerald-500', 'to-green-600');
                
                spinBtn.disabled = false;
                spinBtn.onclick = () => window.open('https://app.gopay.co.id/NF8p/d6bibzzx', '_blank');
            } else {
                // Tampilan KALAH
                if (jackpotQuota === 0) {
                    jackpotMsg.innerText = "Yah, kuota habis! Coba lagi nanti.";
                    jackpotMsg.classList.add('text-red-400');
                    btnText.innerText = "GAME OVER";
                    spinBtn.disabled = true;
                    slotRow.classList.add('grayscale');
                } else {
                    jackpotMsg.innerText = "Belum beruntung, ayo coba lagi!";
                    spinBtn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
