<script>
    // DOM Elements
    const gate = document.getElementById('password-gate');
    const content = document.getElementById('birthday-content');
    const audio = document.getElementById('thr-audio');
    const secondBtn = document.getElementById('2-btn');
    const threeBtn = document.getElementById('3-btn'); // Matches the HTML ID

    // Logic for THR Button
    secondBtn.addEventListener('click', function() {
        gate.style.display = 'none';
        content.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('opacity-0', 'scale-95', 'pointer-events-none', 'select-none');
        }, 50);

        audio.currentTime = 4; 
        audio.play().catch(error => {
            console.log("Audio play blocked:", error);
        });
    });

    // Audio Loop Logic (4s to 45s)
    audio.addEventListener('timeupdate', function() {
        if (this.currentTime >= 45) {
            this.currentTime = 4;
            this.play();
        }
    });

    // UPDATED: Contact Me Button to WhatsApp
    threeBtn.addEventListener('click', function() {
        window.open('https://wa.me/6285600447763', '_blank');
    });
</script>
