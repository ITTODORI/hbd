<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackwater: Pirate Hunt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; touch-action: none; }
        .font-pirate { font-family: 'Cinzel', serif; }
        canvas { display: block; }
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 90%);
            pointer-events: none;
            z-index: 20;
        }
        .ui-layer { z-index: 30; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div class="vignette"></div>

    <div class="absolute inset-0 ui-layer pointer-events-none flex flex-col justify-between p-6">
        <div id="hud" class="flex justify-between items-start opacity-0 transition-opacity duration-1000">
            <div class="space-y-2">
                <div class="bg-black/40 backdrop-blur-md p-3 rounded-xl border border-white/10">
                    <h2 class="text-amber-500 font-pirate text-sm uppercase tracking-widest">Captain's Loot</h2>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🪙</span>
                            <span id="score" class="text-white text-3xl font-bold font-pirate">0</span>
                        </div>
                        <div class="h-8 w-px bg-white/20"></div>
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🗝️</span>
                            <span id="key-count" class="text-white text-3xl font-bold font-pirate">0/3</span>
                        </div>
                    </div>
                </div>
                <div class="w-48 h-3 bg-black/60 rounded-full border border-white/10 overflow-hidden">
                    <div id="hull-bar" class="h-full bg-gradient-to-r from-red-600 to-emerald-500 transition-all duration-300" style="width: 100%"></div>
                </div>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <div class="bg-black/40 backdrop-blur-md p-3 rounded-full border border-white/10 w-16 h-16 flex items-center justify-center relative shadow-lg shadow-black/50">
                    <div id="compass-arrow" class="w-full h-full flex justify-center items-start pt-1 transition-transform duration-100">
                        <div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[16px] border-b-red-500"></div>
                    </div>
                </div>
                <div id="reload-indicator" class="text-[10px] text-amber-500 font-pirate tracking-widest opacity-0">RELOADING</div>
            </div>
        </div>

        <div id="controls-hint" class="text-center opacity-0 transition-opacity duration-500 mb-10">
            <div class="inline-block bg-black/20 backdrop-blur px-4 py-2 rounded-full border border-white/10">
                <p class="text-white/60 text-xs tracking-[0.2em] font-light uppercase">Swipe to Sail • Tap to Fire Broadside</p>
            </div>
        </div>
    </div>

    <div id="menu-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm transition-all duration-700">
        <div class="text-center">
            <h1 id="menu-title" class="font-pirate text-5xl md:text-8xl text-transparent bg-clip-text bg-gradient-to-b from-amber-300 via-amber-500 to-amber-700 mb-2">BLACKWATER</h1>
            <p id="menu-subtitle" class="text-slate-400 mb-10 tracking-[0.4em] uppercase text-xs md:text-sm font-light">The Midnight Tides</p>
            <button id="start-btn" class="group relative px-10 py-4 bg-transparent border border-amber-500/30 pointer-events-auto transition-all hover:border-amber-500">
                <span class="relative text-amber-500 font-pirate text-xl md:text-2xl tracking-widest group-hover:text-white transition-colors">SET SAIL</span>
            </button>
        </div>
    </div>

    <script>
        const CONFIG = {
            shipMaxSpeed: 5,
            acceleration: 0.1,
            friction: 0.98,
            baseTurnSpeed: 0.04,
            waterColor: '#070b14',
            cannonCooldown: 1200,
            monsterHealth: 2,
            maxHull: 100
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiHud = document.getElementById('hud');
        const menuScreen = document.getElementById('menu-screen');
        const menuTitle = document.getElementById('menu-title');
        const menuSubtitle = document.getElementById('menu-subtitle');
        const startBtn = document.getElementById('start-btn');
        const scoreEl = document.getElementById('score');
        const hullBar = document.getElementById('hull-bar');
        const reloadEl = document.getElementById('reload-indicator');
        const keyCountEl = document.getElementById('key-count');

        let width, height, animationId, monsterInterval;
        let lastTime = 0, gameActive = false, score = 0;
        let keysCollected = 0, lastFire = 0;
        
        let ship = { x: 0, y: 0, angle: -Math.PI / 2, vel: 0, targetAngle: -Math.PI / 2, hull: 100 };
        let camera = { x: 0, y: 0 }, input = { active: false, x: 0, y: 0 };
        let particles = [], treasures = [], monsters = [], cannonballs = [], waves = [], keys = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Interaction ---
        function handleStart(x, y) {
            if (!gameActive) return;
            if (Date.now() - lastFire > CONFIG.cannonCooldown) fireCannons();
            input.active = true;
            updateInput(x, y);
        }

        function updateInput(x, y) {
            const dx = x - width / 2;
            const dy = y - height / 2;
            if (Math.hypot(dx, dy) > 20) ship.targetAngle = Math.atan2(dy, dx);
        }

        canvas.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchmove', e => updateInput(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchend', () => input.active = false);
        canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', e => { if(input.active) updateInput(e.clientX, e.clientY) });
        canvas.addEventListener('mouseup', () => input.active = false);

        function fireCannons() {
            lastFire = Date.now();
            reloadEl.style.opacity = "1";
            setTimeout(() => reloadEl.style.opacity = "0", CONFIG.cannonCooldown);

            [-Math.PI/2, Math.PI/2].forEach(offset => {
                const angle = ship.angle + offset;
                cannonballs.push({
                    x: ship.x + Math.cos(angle) * 20,
                    y: ship.y + Math.sin(angle) * 20,
                    vx: Math.cos(angle) * 10,
                    vy: Math.sin(angle) * 10,
                    life: 60
                });
            });
        }

        function spawnMonster() {
            if (!gameActive) return;
            const angle = Math.random() * Math.PI * 2;
            const dist = 1000;
            monsters.push({
                x: ship.x + Math.cos(angle) * dist,
                y: ship.y + Math.sin(angle) * dist,
                angle: angle + Math.PI,
                hp: CONFIG.monsterHealth
            });
        }

        function initGame() {
            Object.assign(ship, { x: 0, y: 0, vel: 0, angle: -Math.PI/2, hull: 100 });
            score = 0; keysCollected = 0;
            scoreEl.innerText = score;
            hullBar.style.width = "100%";
            keyCountEl.innerText = "0/3";
            monsters = []; cannonballs = []; particles = []; waves = []; keys = [];
            
            for(let i=0; i<3; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = 1500 + Math.random() * 1000;
                keys.push({ x: Math.cos(a)*d, y: Math.sin(a)*d });
            }

            menuScreen.classList.add('opacity-0', 'pointer-events-none');
            uiHud.classList.remove('opacity-0');
            gameActive = true;
            monsterInterval = setInterval(spawnMonster, 4000);
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // Sailing Physics: Turning speed depends on velocity (momentum)
            if (input.active) {
                let diff = ship.targetAngle - ship.angle;
                while (diff <= -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                
                // Ship turns slower at high speeds and can't turn at 0 speed
                const turningAgility = Math.min(ship.vel / 2, 1) * CONFIG.baseTurnSpeed;
                ship.angle += diff * turningAgility;
                ship.vel = Math.min(ship.vel + CONFIG.acceleration, CONFIG.shipMaxSpeed);
            }
            
            ship.vel *= CONFIG.friction;
            ship.x += Math.cos(ship.angle) * ship.vel;
            ship.y += Math.sin(ship.angle) * ship.vel;

            camera.x += (ship.x - width / 2 - camera.x) * 0.1;
            camera.y += (ship.y - height / 2 - camera.y) * 0.1;

            // Cannonballs
            cannonballs.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; b.life--;
                if (b.life <= 0) cannonballs.splice(i, 1);
            });

            // Monsters
            monsters.forEach((m, mi) => {
                const targetA = Math.atan2(ship.y - m.y, ship.x - m.x);
                let d = targetA - m.angle;
                while (d <= -Math.PI) d += Math.PI * 2;
                while (d > Math.PI) d -= Math.PI * 2;
                m.angle += d * 0.03;
                m.x += Math.cos(m.angle) * 3;
                m.y += Math.sin(m.angle) * 3;

                // Hit by cannon
                cannonballs.forEach((b, bi) => {
                    if (Math.hypot(m.x - b.x, m.y - b.y) < 30) {
                        m.hp--;
                        cannonballs.splice(bi, 1);
                        if (m.hp <= 0) {
                            score += 250;
                            scoreEl.innerText = score;
                            monsters.splice(mi, 1);
                        }
                    }
                });

                // Hit player
                if (Math.hypot(m.x - ship.x, m.y - ship.y) < 40) {
                    ship.hull -= 0.5;
                    hullBar.style.width = `${ship.hull}%`;
                    if (ship.hull <= 0) endGame();
                }
            });

            // Keys
            keys.forEach((k, i) => {
                if (Math.hypot(k.x - ship.x, k.y - ship.y) < 50) {
                    keys.splice(i, 1);
                    keysCollected++;
                    keyCountEl.innerText = `${keysCollected}/3`;
                    score += 1000;
                }
            });
        }

        function endGame() {
            gameActive = false;
            clearInterval(monsterInterval);
            menuScreen.classList.remove('opacity-0', 'pointer-events-none');
            menuTitle.innerText = "SHIPWRECKED";
            menuSubtitle.innerText = `Loot Recovered: ${score}`;
            startBtn.querySelector('span').innerText = "REBUILD SHIP";
        }

        function draw() {
            ctx.fillStyle = CONFIG.waterColor;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Draw Ship
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            
            // Hull
            ctx.fillStyle = '#3e2723';
            ctx.beginPath();
            ctx.moveTo(35, 0);
            ctx.lineTo(-25, -15);
            ctx.lineTo(-30, 0);
            ctx.lineTo(-25, 15);
            ctx.closePath();
            ctx.fill();

            // Sails
            const sailWidth = 5 + (ship.vel * 2);
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(-10, - sailWidth - 10, 5, sailWidth * 2 + 20);
            ctx.restore();

            // Draw Cannonballs
            ctx.fillStyle = '#fbbf24';
            cannonballs.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            });

            // Draw Keys
            keys.forEach(k => {
                ctx.fillStyle = '#22d3ee';
                ctx.shadowBlur = 15; ctx.shadowColor = '#22d3ee';
                ctx.beginPath(); ctx.arc(k.x, k.y, 8, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw Monsters
            monsters.forEach(m => {
                ctx.save();
                ctx.translate(m.x, m.y); ctx.rotate(m.angle);
                ctx.fillStyle = '#475569';
                ctx.beginPath(); ctx.ellipse(0, 0, 25, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.fillRect(10, -5, 4, 2); ctx.fillRect(10, 3, 4, 2);
                ctx.restore();
            });

            ctx.restore();
        }

        function gameLoop(t) {
            if (!gameActive) return;
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
